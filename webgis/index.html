<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>WebGIS Padang</title>
    <link rel="stylesheet" href="css/leaflet.css" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <script src="js/jquery.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
      }

      /* container-fluid supaya full width */
      .container-fluid {
        display: flex;
        flex-direction: row;
        height: 100vh;
        width: 100%;
        padding: 0; /* hilangkan padding default bootstrap */
      }

      .map {
        flex: 2;
        min-height: 300px;
      }

      .sidebar {
        flex: 1;
        padding: 15px;
        overflow-y: auto;
        background: #f8f9fa;
        border-left: 1px solid #ccc;
      }

      .sidebar h2 {
        font-size: 18px;
        margin-top: 0;
      }

      .form-group {
        margin-bottom: 12px;
      }

      .form-group label {
        display: block;
        margin-bottom: 4px;
      }

      .form-group input,
      .form-group select {
        width: 100%;
        padding: 6px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }

      @media (max-width: 768px) {
        .container-fluid {
          flex-direction: column;
        }

        .sidebar {
          border-left: none;
          border-top: 1px solid #ccc;
        }
      }
      tr.indexKecamatan td {
        font-weight: bolder;
        font-size: 14px;
      }
      tr > th {
        text-align: center;
        vertical-align: middle;
      }
      tr.level0 {
        background-color: #ffffff;
        color: #131214;
      }
      tr.level1 {
        background-color: #3cb44b;
        color: #131214;
      }
      tr.level2 {
        background-color: #ffe119;
        color: #131214;
      }
      tr.level3 {
        background-color: #e6194b;
        color: #131214;
      }
      div.div-table-scroll {
        max-height: 400px;
        overflow-y: auto;
      }
      th.table-sticky {
        position: sticky;
        top: 0;
        background: #f2f2f2;
        z-index: 1;
      }
      table.table-info tr td {
        padding: 2px;
      }
    </style>
  </head>

  <body>
    <div class="container-fluid">
      <div class="sidebar">
        <h2>Webgis Spesial ASI Ekslusif</h2>
        <h3>Kota Padang</h3>

        <div class="form-group">
          <label for="indikator">Pilih Tahun</label>
          <select id="indikator">
            <option value="">Pilih Tahun</option>
            <option value="2023">2023</option>
            <option value="2024">2024</option>
          </select>
        </div>

        <h5>Keterangan Warna</h5>
        <div class="row">
          <div class="col-md-6">
            <table class="table table-info">
              <tr>
                <td>Tinggi : &ge; 80%</td>
                <td style="background-color: #3cb44b; width: 20px">&nbsp;</td>
              </tr>
              <tr>
                <td>Sedang : 50% - 79%</td>
                <td style="background-color: #ffe119; width: 20px">&nbsp;</td>
              </tr>
              <tr>
                <td>Rendah : &le; 50%</td>
                <td style="background-color: #e6194b; width: 20px">&nbsp;</td>
              </tr>
            </table>
          </div>
          <div class="col-md-6">
            <table class="table">
              <tr>
                <td>Warna Default</td>
                <td style="background-color: #bcf60c; width: 20px">&nbsp;</td>
              </tr>
            </table>
          </div>
          <div class="col-md-12">
            <h2>Data ASI Ekslusif</h2>
            <div class="div-table-scroll">
              <table class="table table-bordered">
                <thead>
                  <tr>
                    <th class="table-sticky">No</th>
                    <th class="table-sticky">Kecamatan</th>
                    <th class="table-sticky">Jumlah Bayi</th>
                    <th class="table-sticky">Jumlah diberi ASI Ekslusif</th>
                    <th class="table-sticky">Persentase</th>
                  </tr>
                </thead>
                <tbody id="getdata">
                  <tr>
                    <td colspan="5">Silahkan pilih data</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
      <div id="map" class="map"></div>
    </div>

    <script src="js/leaflet.js"></script>
    <script>
      let webUrlAPI = "https://montecarlo.gisspesialasiekslusif.web.id/";
      let dataAPI = {};

      $(document).ready(function () {
        loadTahunData(0);
      });

      function loadTahunData(index) {
        $.ajax({
          url: webUrlAPI + "dataAsi/getTahun",
          type: "GET",
          success: function (data) {
            let item = eval("(" + data + ")");
            let option = '<option value="">Pilih Tahun</option>';
            if (item.length > 0) {
              for (i = 0; i < item.length; i++) {
                option +=
                  '<option value="' +
                  item[i]["tahun"] +
                  '">' +
                  item[i]["tahun"] +
                  "</option>\n";
              }
            }
            $("#indikator").html(option);
            $("#indikator").prop("selectedIndex", index);
          },
          error: function (jqXHR, ajaxOption, errorThrown) {
            console.log(errorThrown);
          },
        });
      }
    </script>
    <script>
      const map = L.map("map").setView([-0.95, 100.35], 11);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 150,
      }).addTo(map);

      let geoLayer;
      let indikatorData = {};
      let currentIndikator = "tahun";

      let kecamatanColors = {
        "Padang Barat": "#bcf60c",
        "Padang Timur": "#bcf60c",
        "Padang Selatan": "#bcf60c",
        "Padang Utara": "#bcf60c",
        "Koto Tangah": "#bcf60c",
        Kuranji: "#bcf60c",
        "Lubuk Kilangan": "#bcf60c",
        "Lubuk Begalung": "#bcf60c",
        Pauh: "#bcf60c",
        "Bungus Teluk Kabung": "#bcf60c",
        Nanggalo: "#bcf60c",
      };

      function getColor(nama) {
        return kecamatanColors[nama] || "#cccccc";
      }

      function style(feature) {
        const nama =
          feature.properties.nm_kecamatan || feature.properties.kecamatan;
        return {
          fillColor: getColor(nama),
          weight: 1,
          color: "#fff",
          fillOpacity: 0.9,
        };
      }

      function onEachFeature(feature, layer) {
        const nama = feature.properties.nm_kecamatan;
        // console.log("Get Nama Data ", nama);
        const data = indikatorData[nama];
        // console.log("Get Data Item : ", data);

        let puskesmasList = "-";
        if (data?.puskesmas && data.puskesmas.length > 0) {
          puskesmasList =
            "<ul style='margin-left:0; padding-left:0; list-style-position: inside;margin-bottom:0;'>";
          data.puskesmas.forEach((pkm) => {
            puskesmasList += `<li>${pkm.nama_puskesmas}</li>`;
          });
          puskesmasList += "</ul>";
        }

        const popupContent = `
              <b>Kecamatan ${nama}</b><br>
              Puskesmas: ${puskesmasList}`;

        layer.on("mouseover", function (e) {
          layer.setStyle({
            fillOpacity: 0.7,
          });

          L.popup().setLatLng(e.latlng).setContent(popupContent).openOn(map);
        });

        // pasang popup ke polygon
        layer.bindPopup(popupContent);
      }

      fetch(webUrlAPI + "dataAsi/getIndikator")
        .then((res) => res.json())
        .then((data) => {
          data.forEach((item) => {
            indikatorData[item.kecamatan] = item;
          });
          fetch("data/padang_kecamatan.geojson")
            .then((res) => res.json())
            .then((geojson) => {
              geoLayer = L.geoJSON(geojson, {
                style: style,
                onEachFeature: onEachFeature,
              }).addTo(map);
            });
        });

      document
        .getElementById("indikator")
        .addEventListener("change", function () {
          currentIndikator = this.value;
          let formdata = {};
          formdata["tahun"] = currentIndikator;
          if (formdata["tahun"] == "") {
            kecamatanColors = {
              "Padang Barat": "#bcf60c",
              "Padang Timur": "#bcf60c",
              "Padang Selatan": "#bcf60c",
              "Padang Utara": "#bcf60c",
              "Koto Tangah": "#bcf60c",
              Kuranji: "#bcf60c",
              "Lubuk Kilangan": "#bcf60c",
              "Lubuk Begalung": "#bcf60c",
              Pauh: "#bcf60c",
              "Bungus Teluk Kabung": "#bcf60c",
              Nanggalo: "#bcf60c",
            };
            geoLayer.setStyle(style);
            $("tbody#getdata").html(
              "<tr><td colspan=5>Silahkan pilih data</td></tr>"
            );
          } else {
            $.ajax({
              url: webUrlAPI + "dataAsi",
              type: "POST",
              data: formdata,
              dataType: "json",
              beforeSend: function () {
                $("tbody#getdata").html(
                  "<tr><td colspan=5>Permintaan sedang diproses... Silahkan ditunggu</td></tr>"
                );
              },
              success: function (data) {
                console.log(data["datArr"]);
                $("tbody#getdata").html(data["table"]);

                kecamatanColors = {
                  "Padang Barat": getNilaiFormJSON(
                    data["datArr"],
                    "Padang Barat"
                  ),
                  "Padang Timur": getNilaiFormJSON(
                    data["datArr"],
                    "Padang Timur"
                  ),
                  "Padang Selatan": getNilaiFormJSON(
                    data["datArr"],
                    "Padang Selatan"
                  ),
                  "Padang Utara": getNilaiFormJSON(
                    data["datArr"],
                    "Padang Utara"
                  ),
                  "Koto Tangah": getNilaiFormJSON(
                    data["datArr"],
                    "Koto Tangah"
                  ),
                  Kuranji: getNilaiFormJSON(data["datArr"], "Kuranji"),
                  "Lubuk Kilangan": getNilaiFormJSON(
                    data["datArr"],
                    "Lubuk Kilangan"
                  ),
                  "Lubuk Begalung": getNilaiFormJSON(
                    data["datArr"],
                    "Lubuk Begalung"
                  ),
                  Pauh: getNilaiFormJSON(data["datArr"], "Pauh"),
                  "Bungus Teluk Kabung": getNilaiFormJSON(
                    data["datArr"],
                    "Bungus Teluk Kabung"
                  ),
                  Nanggalo: getNilaiFormJSON(data["datArr"], "Nanggalo"),
                };
                geoLayer.setStyle(style);
              },
              error: function (jqXHR, ajaxOption, errorThrown) {
                console.log(errorThrown);
              },
            });
          }
        });

      function getNilaiFormJSON(data, dicari) {
        const item = data.find((d) => d.nama_kecamatan === dicari);
        if (item) {
          return setColor(item.persen);
        } else {
          return setColor(0);
        }
      }

      function setColor(nilai) {
        if (nilai >= 80) {
          color = "#3cb44b";
        } else if (nilai >= 50) {
          color = "#ffe119";
        } else if (nilai > 0) {
          color = "#e6194b";
        } else {
          color = "#bcf60c";
        }

        return color;
      }

      var Base64 = {
        _keyStr:
          "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=",
        encode: function (e) {
          var t = "";
          var n, r, i, s, o, u, a;
          var f = 0;
          e = Base64._utf8_encode(e);
          while (f < e.length) {
            n = e.charCodeAt(f++);
            r = e.charCodeAt(f++);
            i = e.charCodeAt(f++);
            s = n >> 2;
            o = ((n & 3) << 4) | (r >> 4);
            u = ((r & 15) << 2) | (i >> 6);
            a = i & 63;
            if (isNaN(r)) {
              u = a = 64;
            } else if (isNaN(i)) {
              a = 64;
            }
            t =
              t +
              this._keyStr.charAt(s) +
              this._keyStr.charAt(o) +
              this._keyStr.charAt(u) +
              this._keyStr.charAt(a);
          }
          return t;
        },
        decode: function (e) {
          var t = "";
          var n, r, i;
          var s, o, u, a;
          var f = 0;
          e = e.replace(/[^A-Za-z0-9\+\/\=]/g, "");
          while (f < e.length) {
            s = this._keyStr.indexOf(e.charAt(f++));
            o = this._keyStr.indexOf(e.charAt(f++));
            u = this._keyStr.indexOf(e.charAt(f++));
            a = this._keyStr.indexOf(e.charAt(f++));
            n = (s << 2) | (o >> 4);
            r = ((o & 15) << 4) | (u >> 2);
            i = ((u & 3) << 6) | a;
            t = t + String.fromCharCode(n);
            if (u != 64) {
              t = t + String.fromCharCode(r);
            }
            if (a != 64) {
              t = t + String.fromCharCode(i);
            }
          }
          t = Base64._utf8_decode(t);
          return t;
        },
        _utf8_encode: function (e) {
          e = e.replace(/\r\n/g, "\n");
          var t = "";
          for (var n = 0; n < e.length; n++) {
            var r = e.charCodeAt(n);
            if (r < 128) {
              t += String.fromCharCode(r);
            } else if (r > 127 && r < 2048) {
              t += String.fromCharCode((r >> 6) | 192);
              t += String.fromCharCode((r & 63) | 128);
            } else {
              t += String.fromCharCode((r >> 12) | 224);
              t += String.fromCharCode(((r >> 6) & 63) | 128);
              t += String.fromCharCode((r & 63) | 128);
            }
          }
          return t;
        },
        _utf8_decode: function (e) {
          var t = "";
          var n = 0;
          var r = (c1 = c2 = 0);
          while (n < e.length) {
            r = e.charCodeAt(n);
            if (r < 128) {
              t += String.fromCharCode(r);
              n++;
            } else if (r > 191 && r < 224) {
              c2 = e.charCodeAt(n + 1);
              t += String.fromCharCode(((r & 31) << 6) | (c2 & 63));
              n += 2;
            } else {
              c2 = e.charCodeAt(n + 1);
              c3 = e.charCodeAt(n + 2);
              t += String.fromCharCode(
                ((r & 15) << 12) | ((c2 & 63) << 6) | (c3 & 63)
              );
              n += 3;
            }
          }
          return t;
        },
      };
    </script>
  </body>
</html>
